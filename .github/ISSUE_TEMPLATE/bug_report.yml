name: Bug report
description: Report a reproducible problem in Codex Auth Bar
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Codex Auth Bar. Never paste auth.json, tokens, API keys, JWTs, or unredacted logs.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0-rc.1 or git SHA
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS and Mac
      placeholder: macOS 15.5, Apple Silicon
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: "1. Open…\n2. Select…\n3. Observe…"
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Redacted diagnostics
      description: Remove emails, account IDs, filesystem usernames, tokens, API keys, and JWTs before posting.
      render: shell
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I verified that this report contains no credentials or personal account data.
          required: true
