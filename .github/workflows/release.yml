name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    if: ${{ !contains(github.ref_name, '-alpha.') }}
    runs-on: macos-15
    environment: release
    steps:
      - uses: actions/checkout@v6
      - name: Validate release sequence
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]
          if [[ "$(gh release list --limit 1 --json tagName --jq length)" = 0 ]]; then
            test "$GITHUB_REF_NAME" = "v0.1.0-rc.1"
          fi
      - name: Require signing credentials
        env:
          P12: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          NOTARY_KEY: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: test -n "$P12" && test -n "$NOTARY_KEY"
      - name: Import certificates and package
        env:
          DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: ./script/package_release.sh "${GITHUB_REF_NAME}"
      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_args=()
          if [[ "$GITHUB_REF_NAME" == *-rc.* ]]; then
            release_args+=(--prerelease)
          fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              dist/CodexAuthBar-*.dmg dist/CodexAuthBar-*.dmg.sha256 --clobber
            gh release edit "$GITHUB_REF_NAME" --draft=false "${release_args[@]}"
          else
            gh release create "$GITHUB_REF_NAME" \
              dist/CodexAuthBar-*.dmg dist/CodexAuthBar-*.dmg.sha256 \
              --generate-notes --verify-tag "${release_args[@]}"
          fi
